# ── Podcast Shorts Factory configuration ──────────────────────────────

# WHICH AI PROVIDER runs the agents. Default "anthropic" (Claude, paid, best
# taste). To run FREE, pick one below, add its key to .env, set a model, done.
#   provider   free?  get a key at                 good free model
#   ─────────  ─────  ──────────────────────────   ───────────────────────────
#   anthropic   no    console.anthropic.com        (uses the `models:` block below)
#   groq        yes   console.groq.com/keys        llama-3.3-70b-versatile
#   nvidia      yes   build.nvidia.com             meta/llama-3.3-70b-instruct
#   gemini      yes   aistudio.google.com/apikey   gemini-2.0-flash
#   ollama      yes   (local, install ollama)      llama3.1   (needs a good GPU)
llm:
  provider: openrouter         # anthropic | openrouter | groq | nvidia | gemini | ollama | openai
  fallbacks: [gemini]          # tried in order when the primary is rate-limited/errors
                               #   (gemini-2.5-flash — separate free quota, no more default-plan nights)
  timeout_s: 45                # per-call timeout — a hanging provider fails fast → fallback fires
  # PAID, and worth it. The free tier had stopped working: nemotron returned the
  # single word "Alex" as a Manager instruction, then went 429; gemini's quota is
  # exhausted; qwen 404s; gemma 429s. The daily meeting could not run at all.
  # Measured on our real prompts: ~94k in / ~10k out per produce day.
  #   kimi-k2        $0.077/day   $2.31/month   <- chosen
  #   claude-sonnet  $0.434/day   $13.02/month
  # Deliberately the NON-thinking variant: a reasoning model dumping its
  # chain-of-thought into learnings.md is exactly what broke the meeting before.
  model: moonshotai/kimi-k2
  vision_model: "google/gemma-4-26b-a4b-it:free"   # Manager's eyes (fallback: nvidia/nemotron-nano-12b-v2-vl:free)
  # other verified-free OpenRouter fallbacks if this one is rate-limited:
  #   google/gemma-4-26b-a4b-it:free
  #   qwen/qwen3-next-80b-a3b-instruct:free
  #   nvidia/nemotron-3-nano-30b-a3b:free

# Per-agent Claude model (only used when llm.provider = anthropic). Smart split:
# a capable model for taste-sensitive work
# (finding clips, creative planning, analysis) and the cheap one for mechanical
# caption tweaks. Change `default` to bill everything at one rate.
#   claude-haiku-4-5  ($1/$5)   cheapest
#   claude-sonnet-4-6 ($3/$15)  balanced  ← default
#   claude-opus-4-8   ($5/$25)  smartest
models:
  default:     claude-sonnet-4-6
  finder:      claude-sonnet-4-6
  editor:      claude-sonnet-4-6
  uploader:    claude-haiku-4-5
  manager:     claude-sonnet-4-6
  trend_scout: claude-sonnet-4-6

# Which "installed skills" (factory/skills/*.md) each agent loads into its AI
# prompts. Add/remove names freely; run `python run.py skills` to list all.
skills:
  finder:   [money-formula, editorial-standards, editor-craft, short-form-strategy, hooks, storytelling, marketing-psychology, viral-patterns, engagement-tactics, platform-algorithms, series-and-loops, growth-strategy, youtube-monetization]
  editor:   [money-formula, editorial-standards, editor-craft, video-editing, hooks, storytelling, sound-design, visual-effects, scene-mapping, captions-craft, pacing, trending-audio, thumbnail-design, series-and-loops, growth-strategy, youtube-monetization]
  uploader: [money-formula, editorial-standards, copywriting, titles-thumbnails, hashtags-seo, marketing-psychology, thumbnail-design, engagement-tactics, platform-algorithms, growth-strategy, youtube-monetization]
  community: [editorial-standards, engagement-tactics, copywriting, marketing-psychology, platform-algorithms]
  manager:  [editorial-standards, editor-craft, analytics-optimization, marketing-psychology, short-form-strategy, engagement-tactics, platform-algorithms, growth-strategy, youtube-monetization]
  compiler: [editorial-standards, storytelling, copywriting, youtube-monetization, growth-strategy]

finder:
  source_max_height: 1440      # download sources up to 1440p. A 9:16 reframe
                               # punches INTO the source, so 1080p leaves no room
                               # to crop the desk out and fill the frame with the
                               # face (measured: face stays ~24%% of frame).
                               # Channels that upload 4K (Caleb Hammer) now give a
                               # sharp head-and-shoulders punch; Ramsey (1080p max)
                               # stays resolution-bound.
  whisper_model: "small"        # tiny | base | small | medium | large-v3 (bigger = slower/better)
  language: null               # null = auto-detect, or "en", "es", ...
  cookies_from_browser: null   # if YouTube blocks a video ("confirm you're not a bot"),
                               #   set chrome | edge | firefox (CLOSE that browser first — it locks the cookie DB)
  # LANGUAGE GATE — the hardest guard against clipping the wrong video at all.
  # On 2026-07-19 a source URL labelled "# Rio Ferdinand" was actually a Hindi
  # vlog channel; it produced 4 clips because the topic gate only knew how to
  # reject the wrong SPORT. Language is not a judgement call, so a confident
  # mismatch drops the whole source before anything is rendered. Note the topic
  # gate CANNOT cover this case under a money lock: those clips said "salary",
  # "money" and "price", so they would pass a money lexicon. This is the guard
  # that actually stops it.
  expect_language: "en"        # null disables; must match Whisper's detection
  language_min_conf: 0.6       # below this we do not trust the guess enough to drop
  niche_lock: "money"       # hard gate: drop clips from another sport (boxing/UFC/etc.)
                               #   while set. Clear it (null) to open the channel to other niches.
  # VOCABULARY HINT — Whisper conditions on this before decoding, which is the
  # cheap fix for mangled proper nouns. "Anfield, Kop end" was coming out as
  # "Anfield Coppen" and got BURNED into a published clip. Verified on that
  # exact audio: with this hint the line transcribes correctly, at +0.6s per
  # clip. Names are what our hooks are built on, so they must be right.
  # Swapped to money terms by tools/flip_to_money.py.
  vocabulary: >
    credit score, FICO, APR, minimum payment, collections,
    401k, Roth IRA, index fund, S&P 500, compound interest,
    Caleb Hammer, Dave Ramsey, Graham Stephan, debt snowball,
    net worth, take-home pay, overdraft, repossession, escrow.
  whisper_beam: 5              # beam search beats greedy on proper nouns
  # TWO-PASS CAPTIONS: pass 1 (whisper_model above) transcribes the whole episode
  # so the finder can locate moments; pass 2 re-transcribes ONLY the chosen clip
  # windows with refine_model, which is what actually gets burned on screen.
  # Measured here: small 0.4x realtime, medium 1.1x. Medium over a 90-min episode
  # = ~99 min and eats the produce window; medium over 3x40s windows = ~2 min.
  # OFF until the niche flip has landed (enabled by tools/enable_refine.py) so
  # the flip run changes one thing at a time.
  refine_clips: true
  refine_model: "medium"       # tiny | base | small | medium | large-v3
  max_candidates: 8            # how many clip ideas Claude returns per podcast
  clip_min_seconds: 15         # HARD platform bounds only — the AI reasons per clip: the idea
  clip_max_seconds: 42         # RAISED from 32 (2026-07-23). The 32 figure came
                               # from a duration correlation later shown to be
                               # confounded (retired from the craft loop), and
                               # both studied outliers ran 35.6s and 44.4s.
                               # Completeness now governs the cut: sentence
                               # snapping + a self-check extend past the cap
                               # slightly rather than end mid-thought.
  verify_complete: true        # after sentence snapping, the finder asks the
                               # model whether the thought is actually finished
                               # at the cut, and extends the end if not
  auto_approve_top: 3          # for unattended/scheduled runs: auto-approve the top N candidates
  # What makes a moment "viral" — tweak to steer the AI's taste
  selection_brief: |
    MONEY/BUSINESS CHANNEL (flipped 2026-07-20).
    THE RULE: DRAMA EARNS THE WATCH, THE LESSON EARNS THE FOLLOW. Every clip
    must teach the viewer ONE concrete thing they can use. A clip that is only
    a trainwreck is entertainment nobody follows for; a clip that is only
    advice is a lecture nobody watches. We want both, in that order.
    HARD REQUIREMENT - THE TAKEAWAY: before selecting a moment, state in one
    sentence what a viewer LEARNS from it, specific enough to act on this week.
    "Minimum payments on a 27% APR card mean the balance barely moves" is a
    takeaway. "Get your finances together" is not. IF YOU CANNOT NAME THE
    TAKEAWAY, DO NOT PICK THE MOMENT, however dramatic it is.
    THE 4-BEAT SHAPE:
      (1) HOOK on the number or the claim, no wind-up. A number to the cent
          beats a round one ("$15,586.97" beats "$15k").
      (2) THE MISTAKE, named specifically - what they actually did wrong.
      (3) THE MECHANISM - WHY it went wrong. This is the teaching beat and the
          one that makes a viewer feel smarter for having watched.
      (4) THE FIX or the cost - what to do instead, or what this actually cost
          them in money or years. End on the insight, not on the shouting.
    STRONGLY FAVOR: moments where an expert explains WHY something went wrong,
    a number that reframes how something works (interest, fees, leases,
    minimum payments, credit scores), a common mistake most viewers are also
    making, forbidden/under-known money facts that are TRUE and checkable,
    before-and-after turnarounds with the actual steps.
    STRONGLY AVOID: pure humiliation with nothing learnable, dry theory with no
    number or stakes, vague advice ("budget better"), anything financially
    WRONG or misleading - we are teaching real people about their money and a
    confidently wrong clip is worse than no clip. If the expert is speculating,
    do not present it as fact.
    LENGTH: TARGET 25-40s. The studied million-view outliers ran 35.6s and
    44.4s; the old shorter-is-better rule was measured on inflated data and is
    retired. COMPLETENESS BEATS LENGTH: before locking a window, ask whether
    the thing being talked about is actually OVER at the cut. Never end a clip
    mid-thought, mid-sentence or before the punchline; extend a few seconds to
    let the speaker finish instead.

editor:
  ai_plan: true                # let the editor's skills (hooks/story/sfx/vfx) design each edit
  resolution: [1080, 1920]     # 9:16 vertical
  reframe: "smart"             # smart = don't crop 2-person shots (show both, phone-friendly); punch in only on a lone face
                               #   "face" = always punch-in crop;  "blur"/"black" = always fit whole frame
  background: "blur"           # blur | black  (the fitted-frame style: blurred fill vs black bars)
  motion_zoom: true            # gentle slow zoom-in (Ken Burns) so talking-head footage feels alive
  motion_amount: 0.10          # how far it zooms over the clip (0.10 = 10%); 0 or motion_zoom:false to disable
  punch_zoom: true             # quick zoom PUNCH when an emphasis word is spoken (retention spike)
  flash_transitions: true      # white-flash accents at the planner's topic shifts (hard-cut feel)
  broll: false                 # OFF (2026-07-16): random stock/AI-artifact images over talking
                               # heads read as spam ("what a mess" comments) — the Manager's own
                               # directive says zero b-roll on talking-head clips. Re-enable only
                               # for content that shows things (tactics, places, products).
  max_broll: 2                 # at most this many b-roll images per clip (needs PEXELS_API_KEY in .env)
  broll_video: true            # prefer moving stock VIDEO b-roll (Pexels) over still photos
  # Designed scenes (scene-mapping skill): the planner maps every clip line-by-line
  # into 'visual' (crucial line → AI-designed on-brand scene, animated with a slow
  # zoom) and 'breather' (pure subtitles — NOTHING else on screen) segments.
  # Designs are generated free via Pollinations (no key), cached, and fall back to
  # stock b-roll if generation fails. Breathers also suppress memes/b-roll there.
  design_scenes: false         # OFF (2026-07-17): AI-generated stills over talking heads read as
                               # slop (garbled pseudo-text artifacts; part of the 'what a mess'
                               # roast) and are exactly YouTube's inauthentic-content fingerprint.
  max_design_scenes: 3         # at most this many designed visuals per clip
  brand_style: "clean minimal flat illustration, bold simple shapes, dramatic lighting, editorial sports-graphic look"
  brand_colors: ["white", "deep green", "black"]   # matches the channel logo set in brand/
  track_face_per_shot: true    # re-center the crop on the face at every camera cut
  speaker_cuts: true           # 2-person shots: alternate host-cam / guest-cam crops
  camera_cuts: true            # fake-multicam: hard zoom cuts (wide<->close) at sentence ends + whoosh
  scene_cuts: true             # cut on the source's REAL camera changes (PySceneDetect), not just sentence ends
  grade: true                  # cinematic color grade (contrast + saturation + vignette)
  progress_bar: true           # thin retention bar filling along the bottom
  cta: true                    # subscribe ask — fires at the emotional PEAK (mid-clip) plus a
                               # short end card. 2026-07-18 analytics: 48,888 views -> 6 subs
                               # (0.012%) with an end-only ask; subs are the binding YPP gate.
  cta_mid_text: "SUBSCRIBE"    # the peak-moment ask (short — it must not compete with captions)
  number_cards: true           # spoken dollar figures pop oversized at the
                               # moment they land (Money Guy pattern; ~30 of 50
                               # studied viral money clips carry a figure)
  takeaway_card: true          # burn the LESSON on screen in the last third.
                               # The channel's promise is that a viewer leaves
                               # knowing something; viewers skim, so a lesson
                               # that only exists in the audio does not land.
  comment_prompt: true         # burn the caption's forced-choice question on screen at the end
                               # (comments were 19 per 48,888 views — they only lived in the description)
  cta_text: "FOLLOW FOR MORE"
  teaser: true                 # narrator cold-open: flash-preview of the payoff before the clip
  voiceover: true              # free AI narrator (Edge TTS, no key needed)
  voice: "en-US-ChristopherNeural"   # try en-US-GuyNeural, en-GB-RyanNeural, en-US-AriaNeural
  memes: true                  # meme/reaction inserts at emotional peaks
  memes_dir: "assets/memes"    # drop your favorite reaction clips here (see README inside)
  loudnorm: true               # broadcast loudness (-14 LUFS, YouTube standard) on the final mix
  qa: true                     # self-check every render (duration + audible audio) before it can post
  font_file: "C:/Windows/Fonts/ariblk.ttf"    # Arial Black: overlays match the heavier captions
  make_cover: true             # also export a thumbnail/cover image per clip
  mix_sfx: true                # play the planner's SFX cues (assets/sfx/<type>.wav) in the render
  sfx_dir: "assets/sfx"
  sfx_volume: 0.5
  trim:                        # cut filler words + dead air (the pro-vs-amateur lever)
    enabled: true
    remove_fillers: true
    max_gap: 0.45              # silences longer than this get tightened
    pad: 0.05                  # keep this much around each kept word
    min_removed: 0.2           # skip the extra encode pass if it'd save less than this
    # conservative by default; add risky ones ("like","so","right") only if you want
    fillers: [um, uh, uhh, uhm, erm, hmm, mm, mmm, ah, er]
    phrases: []                # multi-word fillers, e.g. ["you know", "i mean"]
  music_dir: "assets/music"    # drop royalty-free tracks here; one is picked at random
  music_duck: true             # sidechain-duck the music under the voice.
                               # Was a flat level, so the bed masked speech during
                               # dense narration. Broadcast standard is a 9-12 dB
                               # duck: threshold 0.03 + ratio 8 lands there.
  duck_threshold: 0.03
  duck_ratio: 8
  duck_attack: 20              # ms, fast enough to catch a syllable
  duck_release: 300            # ms, slow enough not to pump between words
  music_volume: 0.16           # 0 = off, 1 = full. Raised 0.12→0.16 (2026-07-17): million-view
                               # money clips run a PRESENT bass-y bed, not wallpaper.
  loudnorm_i: -12              # master loudness target; viral shorts master hot (-10 to -12)
  captions:
    words_per_page: 2          # 1-2 word pages (million-view standard; numbers page SOLO)
    enabled: true
    font: "Arial Black"        # heavier face per the 50-clip study: every
                               # documented caption system runs a heavy
                               # geometric sans; Arial Bold read one weight
                               # too light next to the reference clips
    font_size: 104
    primary_color: "&H00FFFFFF"      # white (ASS BGR hex)
    highlight_color: "&H0000F0FF"    # active-word highlight (yellow-ish)
    outline: 9
    position: "lower"               # center | bottom
  add_intro_hook: true          # overlay the clip title for the first ~2s
  intro_card: true              # animated Remotion kinetic-typography hook card (needs remotion/
                                # installed + Node). Replaces the static hook. Renders ~5-10s/clip.
                                # Opt-in: flip true once verified reliable in the unattended 6AM run.

uploader:
  schedule_mode: true          # upload the whole day at produce time; YouTube publishes
                               # each post server-side at post_times — PC can be off all day
  post_times: ["09:00", "14:00", "21:30"]   # UK is 66% of viewers (1h behind us): 14:00=UK lunch
                               #   (our best slot, 2-4x), 21:30=UK 20:30 prime. 19:00 local was UK 18:00 = weakest.
  ai_optimize: true             # rewrite title/caption/hashtags per platform using copywriting skills
  platforms: ["youtube", "tiktok", "instagram"]
  privacy: "public"             # auto-uploads post live to YouTube (hands-off)
  hashtags: ["#podcast", "#shorts", "#clips"]

# Finishing Editor (Agent 8) — the assistant editor / QA reviewer. Runs after the
# Editor and before posting: watches each finished clip for the flaws a human
# catches on playback (captions on a face, black/frozen frames, dead air, clipped
# or too-quiet audio, wrong duration), auto-fixes the cheap ones and pings your
# phone on anything broken. Optional last-stage 'film look' pass.
finisher:
  enabled: true
  block_on_fail: true          # true = a critically-broken clip is held back (status 'flagged') instead of posting.
                               # Produce backfills the freed slot with the next-best fresh clip, so blocking never
                               # thins the day's schedule (see finder.produce_target / min_queue below).
  min_queue: 1                 # last-ditch floor: if EVERY clip failed QA, keep the least-bad one so the channel is
                               # never fully dark on a day. 0 = allow an empty day (pure block, may miss all posts).
  autofix_quiet: true          # gain-up a too-quiet mix automatically
  film_finish: false           # optional final film-grain + micro-sharpen pass (extra encode; Editor already grades)
  checks:
    black: true                # fully-black stretches (broken render)
    freeze: true               # frozen/stuck frames
    silence: true              # dead-air gaps mid-clip
    levels: true               # clipped or too-quiet audio
    face_captions: true        # captions overlapping the speaker's face
    face_edge: true            # a person cut in half by the frame edge (bad punch-in)

# Montage Shorts — FORMAT EXPERIMENT (started 2026-07-11, review after ~1 week):
# one ARC7-style emotional montage per day (3-4 cross-episode micro-moments,
# name tags, emoji sticker, whooshes, ducked music) REPLACES one of the three
# daily clips. kind='montage' in the DB; the Manager's leaderboard carries
# `format` so the numbers decide if the format lives.
montage:
  enabled: false               # RETIRED 2026-07-18 on its own data: 3 montages
                               # averaged 15.3% retention vs 46.8% for regular
                               # clips, on 945 avg views vs 2,277. The experiment
                               # ran its week and answered the question: no.
                               # Its slot goes back to a regular clip.
  take_min: 6                  # seconds per micro-moment
  take_max: 14
  score: 75                    # queue priority for the scheduler (score-ordered)

# Compiler (Agent 9) — the showrunner. Weekly 16:9 long-form episode stitched from
# the week's best moments with an AI narrator carrying a real editorial spine
# (thesis → per-clip setup/analysis → verdict). Monetization-safe by construction:
# commentary share is MEASURED on the finished cut and episodes under the floor are
# never uploaded (2026 reused-content rules put the review trigger around 30%).
compiler:
  enabled: true
  publish_day: "sun"           # weekly slot (server-side publishAt — PC can be off)
  publish_time: "15:00"
  min_segments: 4              # skip the week if fewer good moments are available
  max_segments: 6
  max_excerpt: 75              # hard cap per continuous source excerpt (seconds)
  min_commentary_share: 0.30   # narrator/cards fraction of runtime; below = hold back
  cold_open: true              # open on the raw #1 moment before anything else — retention data
  cold_open_seconds: 7         #   (2026-07-15) showed 43% bail in 17s on the OLD narrator-card open
  intro_card: false            # the spoken "promise" slate was the #1 drop-zone → OFF; the cold
                               #   open now carries the hook as burned TEXT over real footage
  category_id: "24"            # 24 = Entertainment (17 = Sports)
  music: true                  # continuous bed, sidechain-ducked under all speech
  music_volume: 0.30           # bed level before ducking (final loudnorm evens it out)
  # voice: inherits editor.voice unless set

manager:
  lookback_days: 28
  learnings_file: "learnings.md"
  review_before_post: true     # Manager reviews every clip pre-upload; bounces weak ones
                               # back to the Editor with notes (1 retry, then reject+alert you)

# Trend Scout — uses Claude's web search to pull current short-form trends and
# write trends.md, which the Finder reads to bias selection toward what's hot.
# Trainer — the team's coach. Weekly: studies the top-performing Shorts in the
# niche (YouTube API) + their comments, researches policy/meta changes, backtests
# the Finder's predictions, then (with the Manager's approval) updates ONE craft
# playbook so the whole team learns. Can never touch editorial-standards.
trainer:
  enabled: true
  study_window_days: 180       # look back this far for a channel's biggest hits
  study_channels_per_run: 3    # search costs 100 quota units each; rotate rather
                               # than query every channel every week
  study_queries: ["financial audit clips", "money podcast shorts", "debt confrontation clips"]
  # Winner channels from the 2026-07-10 teardown (research/competitors.md) — the
  # Trainer studies THESE directly each week (uploads playlists, ~2 quota units
  # each) instead of burning 100-unit searches. IDs, not handles, on purpose.
  study_channels:
    # Money-niche winners (teardown 2026-07-17, views/video)
    - "UCLe_q9axMaeTbjN0hy1Z9xA"   # Caleb Hammer (902k)
    - "UCV6KDgJskWaEckne5aPA0aQ"   # Graham Stephan (868k)
    - "UC7eBNeDW1GQf2NJQ6G6gAxw"   # The Ramsey Show Highlights (287k)
    - "UCmMsCFzAufSYef6tA8h1hzQ"   # You Should Know Podcast (399k)
    - "UCeBQ24VfikOriqSdKtomh0w"   # The Iced Coffee Hour Clips (125k)
  playbooks: [hooks, pacing, captions-craft, video-editing, titles-thumbnails, growth-strategy, youtube-monetization, thumbnail-design]

trend_scout:
  enabled: true
  niche: "money, personal finance, business, wealth — viral money stories, debt drama, get-rich journeys"
  trends_file: "trends.md"

# Scheduled runs pull the newest DOWNLOADABLE (skips members-only/unavailable) video
# from these channels, rotating through them and skipping ones already processed.
# You can add ANY channel/playlist URL — the factory picks whatever has fresh,
# clippable content. `python run.py produce`/`daily` use this list.
scheduler:
  content_since: "2026-07-20"   # niche flip watershed: montage/compiler only use clips after this
  sources:
    # Money/Business era (flipped 2026-07-20). Confrontation + emotion first —
    # the money equivalents of the Keane/Trent drama that won for us.
    - "https://www.youtube.com/@CalebHammer/videos"        # Financial Audit — debt trainwreck drama
    - "https://www.youtube.com/@TheRamseyShow/videos"      # Ramsey — confrontation, debt-free screams
    - "https://www.youtube.com/@TheDiaryOfACEO/videos"     # DOAC — rags-to-riches, big names
    - "https://www.youtube.com/@MyFirstMillionPod/videos"  # MFM — business ideas, "how they made $X"
  source_url: ""               # legacy single-source fallback (used if sources is empty)

# How the agents talk to YOU: everything important lands in activity.md
# (newest first), and toast: true also pops Windows notifications for posts,
# failures, and the morning "queue ready" message.
notify:
  toast: true
  # PHONE push (free): install the "ntfy" app (Play Store / App Store), open it,
  # "+ Subscribe to topic", type the topic below — done. Keep the topic secret;
  # anyone who knows it can read these notifications.
  ntfy_topic: "clips-mania-4f437165"

# The editor's self-learning loop (factory/craft.py). Every render records what
# it actually did (cut rate, punches, SFX, hook length, reframe...) into the
# `edit_specs` table; once those clips have retention data the loop scores each
# choice and writes craft.md, which the planner loads into EVERY edit prompt.
# So editing decisions come from the audience, not from taste.
craft:
  file: craft.md

# Recurring SERIES branding — the fix for 48,888 views converting 6 subscribers.
# A one-off clip gives nobody a reason to follow; a named, NUMBERED series turns
# "a video I watched" into "a thing I follow", and the number implies more exist.
# Titles become "NAME #12: ..." and a small badge burns into the top of frame.
# Switched on by tools/flip_to_money.py with the money name (staying off for the
# last football days so we don't start a series we're about to abandon).
series:
  enabled: true
  name: "MUGSHOT"                     # e.g. "THE RECEIPTS"
  number_from: 1               # first episode number
  started: ""                  # ISO date the series began; numbering counts only
                               # uploads on/after it (set by the flip). Empty =
                               # falls back to scheduler.content_since.
  in_titles: false             # OFF: the "MUGSHOT #N: " prefix ate the first 12
                               # characters of every title, which is exactly where
                               # the dollar amount or the name needs to be. The
                               # on-screen badge still carries the series identity.
  badge: true                  # burn the series name into the top of the frame
